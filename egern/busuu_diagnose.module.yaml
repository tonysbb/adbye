name: "Busuu Diagnose"
description: "Egern 诊断模块，用于捕获 Busuu 实际请求 URL 与响应状态。"
author: "tonysbb"
homepage: "https://github.com/tonysbb/adbye"
manual: "https://github.com/tonysbb/adbye/blob/main/README.md"
icon: "stethoscope"

scriptings:
  - http_request:
      name: "Busuu 请求诊断"
      match: "^https://[^/]*busuu\\.com(?::443)?/.*$"
      script_url: "https://raw.githubusercontent.com/tonysbb/adbye/main/egern/scripts/busuu_diag_request.js"
      timeout: 10
  - http_response:
      name: "Busuu 响应诊断"
      match: "^https://[^/]*busuu\\.com(?::443)?/.*$"
      script_url: "https://raw.githubusercontent.com/tonysbb/adbye/main/egern/scripts/busuu_diag_response.js"
      timeout: 10

mitm:
  hostnames:
    - "*.busuu.com"
