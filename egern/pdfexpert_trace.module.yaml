name: "PDF Expert Trace"
description: "Egern 追踪模块，用于捕获 PDF Expert 会员状态相关接口。"
author: "tonysbb"
homepage: "https://github.com/tonysbb/adbye"
manual: "https://github.com/tonysbb/adbye/blob/main/README.md"
icon: "waveform.path.ecg"

scriptings:
  - http_request:
      name: "PDF Expert 全量请求追踪"
      match: "^https://[^/]*(?:readdle|pdfexpert)\\.com(?::443)?/.*$"
      script_url: "https://raw.githubusercontent.com/tonysbb/adbye/main/egern/scripts/pdfexpert_trace_request.js"
      timeout: 10
  - http_response:
      name: "PDF Expert 全量响应追踪"
      match: "^https://[^/]*(?:readdle|pdfexpert)\\.com(?::443)?/.*$"
      script_url: "https://raw.githubusercontent.com/tonysbb/adbye/main/egern/scripts/pdfexpert_trace_response.js"
      body_required: true
      timeout: 10

mitm:
  hostnames:
    - "*.readdle.com"
    - "*.pdfexpert.com"
